<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FancyFont Generator MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>FancyFont Generator</h1>
        <p>
          Vælg stil-parametre i menuen og se en "ny" font-stil genereret live til preview.
        </p>
      </header>

      <section class="layout">
        <form id="controls" class="panel">
          <h2>Menuindstillinger</h2>

          <label>
            Stil
            <select id="style">
              <option value="sans">Sans</option>
              <option value="serif">Serif</option>
              <option value="slab">Slab serif</option>
              <option value="script">Script</option>
              <option value="display">Display</option>
              <option value="mono">Mono</option>
            </select>
          </label>

          <label>
            Hældning
            <select id="inclination">
              <option value="upright">Upright</option>
              <option value="slanted">Slanted</option>
              <option value="italic">Italic</option>
            </select>
          </label>

          <label>
            Vægt: <output id="weightValue">500</output>
            <input id="weight" type="range" min="100" max="900" step="100" value="500" />
          </label>

          <label>
            Bredde: <output id="widthValue">100</output>%
            <input id="width" type="range" min="80" max="130" step="1" value="100" />
          </label>

          <label>
            Kontrast: <output id="contrastValue">0</output>
            <input id="contrast" type="range" min="-15" max="15" step="1" value="0" />
          </label>

          <label>
            Rounding: <output id="roundValue">0</output>
            <input id="round" type="range" min="0" max="16" step="1" value="0" />
          </label>

          <label>
            Tekst til preview
            <textarea id="previewText" rows="4">The quick brown fox jumps over the lazy dog. ÆØÅ æøå 12345</textarea>
          </label>
        </form>

        <section class="panel preview-wrap">
          <h2>Live Preview</h2>
          <article id="preview" class="preview">
            The quick brown fox jumps over the lazy dog. ÆØÅ æøå 12345
          </article>

          <div class="meta">
            <h3>Genereret font-opskrift</h3>
            <pre id="recipe"></pre>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
